# WikiForge unified configuration
# Vault selection, language, and retrieval backend settings
# See docs/CONFIG_SCHEMA.md for full schema, future fields, and implementation notes

# === CURRENT SELECTIONS (used by all operations) ===
active_vault: oma-test-1
active_lang: es

# === RETRIEVAL BACKEND (Phase 1: BM25 implementation) ===
#
# Currently implemented: BM25 only
# The fields below are READ and USED by .claude/scripts/retrieve.py
# Future backends (llm, embeddings) will be added here once implemented
#
retrieval:
  # Current backend selection
  # Options: "bm25" (implemented), "llm" (future), "embeddings" (future)
  backend: bm25

  # === BM25 Configuration (currently active) ===
  # These parameters control TF-IDF scoring in retrieve.py
  bm25:
    enabled: true

    # TF-IDF multipliers (control relevance scoring)
    topic_boost: 3.0      # Score multiplier when query token matches atom topic
                          # Range: 1.0-10.0, higher = topic matches rank higher

    claim_boost: 2.0      # Score multiplier for matches in claim field vs body
                          # Range: 1.0-5.0, higher = claim matches are more valuable

  # === LLM Fallback (planned, Phase 2) ===
  # NOT YET IMPLEMENTED - fields below are for future use
  # When ready, these will control when LLM is called as fallback
  llm:
    # enabled: false
    # model: "claude-haiku"
    # trigger_type: "bm25_confidence"  # Only use LLM when BM25 is ambiguous
    # threshold: 1.5  # Use LLM if top1_score / top2_score < threshold

  # === Embeddings (planned, Phase 3) ===
  # NOT YET IMPLEMENTED - will replace BM25 for semantic retrieval
  # embeddings:
  #   enabled: false
  #   model: "distiluse-base-multilingual-cased-v2"
  #   storage_type: "memory"  # Options: memory, faiss
  #   min_similarity: 0.4
