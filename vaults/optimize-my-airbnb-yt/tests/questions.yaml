# Baseline Test Suite — 20 preguntas estandarizadas
# Estas preguntas SIEMPRE son las mismas. Son el benchmark deterministic.
# Balance: host genérico (preguntas naturales) + OMA-deep (frameworks específicos del corpus)

version: "2.0"
language: "es"
total_questions: 20
levels: 4
questions_per_level: 5

# Cost weighting:
# weighted_cost = input_tokens + (6 * output_tokens)
# (output cuesta 6x más que input)

questions:
  # ============================================================
  # NIVEL 1 — BÁSICO (host nuevo, dudas naturales)
  # ============================================================
  Q1:
    level: 1
    text: "Acabo de publicar mi anuncio. ¿Qué precio inicial pongo?"

  Q2:
    level: 1
    text: "¿Cuántas fotos subo y cuál pongo de portada?"

  Q3:
    level: 1
    text: "¿Qué pongo en el título y las primeras líneas del summary?"

  Q4:
    level: 1
    text: "¿Debo activar Instant Book desde el principio?"

  Q5:
    level: 1
    text: "¿Cómo consigo mis primeras reseñas?"

  # ============================================================
  # NIVEL 2 — INTERMEDIO (host con experiencia, frameworks tácticos)
  # ============================================================
  Q6:
    level: 2
    text: "Tengo huecos de 1-2 noches sueltas entre reservas que no se llenan. ¿Qué hago?"

  Q7:
    level: 2
    text: "¿Cuándo subo el cleaning fee y cuándo lo bajo?"

  Q8:
    level: 2
    text: "¿Cómo respondo públicamente a una reseña negativa?"

  Q9:
    level: 2
    text: "¿Qué amenities destaco y cuáles no aportan al booking?"

  Q10:
    level: 2
    text: "Recibo un mensaje de pre-booking que me huele mal. ¿Cómo lo gestiono sin perder al guest si es legítimo?"

  # ============================================================
  # NIVEL 3 — AVANZADO (optimización, frameworks profundos)
  # ============================================================
  Q11:
    level: 3
    text: "¿Cómo configuro PriceLabs para que el dynamic pricing funcione bien (min stay, last-minute, base)?"

  Q12:
    level: 3
    text: "¿Qué filtros aplica un guest en search antes de hacer click en mi listing?"

  Q13:
    level: 3
    text: "¿Cuál es el message flow ideal desde booking hasta post-checkout?"

  Q14:
    level: 3
    text: "¿Cómo interpreto Airbnb Insights y qué KPIs priorizo semanalmente?"

  Q15:
    level: 3
    text: "Un guest pide extender estancia mid-stay. ¿Cuándo acepto y cuándo rechazo?"

  # ============================================================
  # NIVEL 4 — EXPERTO (estrategia, escalado, integral)
  # ============================================================
  Q16:
    level: 4
    text: "¿Cómo construyo direct bookings y reduzco mi dependencia de las OTAs?"

  Q17:
    level: 4
    text: "¿Cómo evalúo un mercado para invertir en una segunda propiedad (discovered vs undiscovered)?"

  Q18:
    level: 4
    text: "¿Cuándo contrato un property manager, cómo lo elijo, y bajo qué estructura legal?"

  Q19:
    level: 4
    text: "¿Cómo paso de 1 a 5 listings sin perder calidad ni control operativo?"

  Q20:
    level: 4
    text: "Mi listing está estable (4.9★, 75% occupancy). ¿Cómo lo llevo al 'elite tier'?"
