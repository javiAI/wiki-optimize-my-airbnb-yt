# Baseline metadata
# The baseline is the reference run pre-optimización; it has no target_dims
# (we're not optimizing anything yet — just measuring).
# All dims are "neutral" since baseline establishes the floor for everything.

label: baseline
description: "Reference run pre-optimización"
optimization_type: reference

target_dims: []
at_risk_dims: []
neutral_dims: [completeness, accuracy, spanish_purity, tone, format_compliance]

predicted_deltas: {}

predictions_justification: |
  Baseline establishes reference metrics. No predictions because nothing has changed.
  All future Ox compare against this point.

# Repetition policy: baseline should be highly stable. Re-run only if asked.
allow_repetition: false
