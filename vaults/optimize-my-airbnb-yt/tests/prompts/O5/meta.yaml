# O5: Response Format Templates (Regime A/B/C) + Anti-anglicismo
# Adds three regime templates (Narrow Factual / Tactical Multi-Palanca / Taxonomic-Broad)
# in queries/RESPONSE_TEMPLATES.md, kernel §4.6 FORMAT CHECK, and a strict
# anti-anglicismo block in §10.7 with mandatory ES substitutions table.
# Builds on top of O4v2 (smart resolver). Baseline = pre-O5 (current post-O4v2 kernel).

label: O5
description: "Response Format Templates: regime-based structure (A/B/C) + anti-anglicismo block in §10.7"
optimization_type: kernel_logic
class: structural

target_dims: [format_compliance, spanish_purity]
at_risk_dims: [tone]
neutral_dims: [completeness, accuracy]

predicted_deltas:
  cost: -3.0                   # templates más estructurados → respuestas más concisas; ceiling A=250 ataja overshoots
  format_compliance: +1.0      # 8.25 → ~9.25; templates fuerzan secciones obligatorias y respetan ceilings
  spanish_purity: +2.0         # 5.60 → ~7.60; tabla de substituciones obligatorias + lista whitelist explícita
  tone: -0.1                   # riesgo: templates rígidos pueden sentirse burocráticos; mitigación = secciones mínimas opcionales
  completeness: +0.2           # secciones obligatorias (Por qué funciona / Resultado esperado) capturan caveats antes implícitos
  accuracy: 0                  # cambio estructural, no de contenido

iteration_note: |
  O5 run-1 falló (composite -0.018, target_dim_regression en format_compliance -0.85).
  Diagnóstico: (a) RESPONSE_TEMPLATES.md vivía en queries/ que está prohibido para agentes,
  (b) tabla de substituciones del kernel cubría solo ~10 anglicismos cuando los reales son
  decenas (weekend, hot tub, base price, etc.), (c) ceiling no se enforceaba con checklist explícito.

  O5 v2 (run-2): templates movidos a meta/RESPONSE_TEMPLATES.md, agent template actualizado para
  permitir lectura de meta/, tabla de substituciones expandida a 35+ entradas, pre-output checklist
  obligatorio de 6 puntos en §10.7, ejemplos por régimen en §4.6.1.

predictions_justification: |
  pre-O5 baseline (run-1, n=20, custom 5-dim rubric):
    completeness 9.80 / accuracy 9.40 / spanish_purity 5.60 / tone 9.00 /
    format_compliance 8.25 / weighted_avg 8.64 / avg_tokens 49,270 / Q.

  Targets:
  - format_compliance (8.25): tactical Qs (Q1, Q2, Q3, Q5, Q6, Q9) excedieron 600
    palabras. O5 introduce ceiling explícito por régimen + sección "recortar antes
    de devolver" en §4.6.4. Esperamos que el régimen B se quede en ≤600 sin overshoot.
  - spanish_purity (5.60): el cuello sistemático del baseline. Anglicismos recurrentes
    (host, guest, review, fee, cleaning fee, booking, check-in) sin disciplina
    central. O5 §10.7 añade tabla de substituciones obligatorias + whitelist
    explícita + instrucción "ANTES de devolver, releer y corregir".

  Riesgo principal: tone (-0.1). Templates con secciones nominadas pueden sentirse
  rígidos. Mitigación: el template B mantiene "Diagnóstico" opcional + el
  contrato §10.7 mantiene "humano, profesional, cálido (no robótico)" como
  primera línea.

  Si tone cae más de 0.5 abs, hard-floor (any-dim drop ≥1.0) NO se rompe pero
  composite v2.0 podría caer al noise zone. Si format_compliance no sube ≥0.5,
  ITERATE para revisar regime detection.

allow_repetition: true
