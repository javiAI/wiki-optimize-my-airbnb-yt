# O3: Language Consistency
# Audit + standardization of 156 atoms (naming, casing, claim brevity, body length,
# excerpts, confidence levels). Goal: reduce noise/variance, marginal cost win.

label: O3
description: "Language Consistency (atom naming/casing/format normalization)"
optimization_type: hygiene

target_dims: [format_compliance]
at_risk_dims: []
neutral_dims: [completeness, accuracy, spanish_purity, tone]

predicted_deltas:
  cost: -3.0
  format_compliance: +0.3

predictions_justification: |
  Consistent atom format -> agents have less variance in their output formatting.
  Mild cost win from shorter/cleaner atom bodies. spanish_purity NOT a target
  because O3 normalizes structure, not vocabulary (vocab cleanup would be a
  separate optimization). Tone, completeness, accuracy untouched by format
  changes to the underlying atoms.

allow_repetition: true
