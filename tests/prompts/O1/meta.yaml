# O1: Hierarchical Indices
# Cost-only optimization: replace flat index.md (~4k tokens) with tiered L1+L2.
# Quality dims should remain stable; we accept small regressions on completeness
# / format_compliance as collateral (less context).

label: O1
description: "Hierarchical Indices (flat index.md -> tiered L1 + L2 sub-indices)"
optimization_type: cost_reduction

target_dims: []
at_risk_dims: [completeness, format_compliance]
neutral_dims: [accuracy, spanish_purity, tone]

predicted_deltas:
  cost: -25.0
  completeness: -0.5
  format_compliance: -0.3

predictions_justification: |
  Tier-1 index reduces context loaded per query, hence cost win expected ~25%.
  Risk: agents see less surface area at a glance, may miss caveats (completeness)
  or skip steps (format_compliance). spanish_purity / accuracy / tone unaffected
  by index structure — they depend on the atom bodies and §10.7 contract.

allow_repetition: true
