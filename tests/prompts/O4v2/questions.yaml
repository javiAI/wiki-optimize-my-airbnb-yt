# O4v2 Custom Test Battery — 15 questions probing real vault conflicts
# Categories:
#   T = Temporal supersession (pre-2025 vs post-2025)
#   C = Contextual scope (both apply, different conditions)
#   D = Direct contradiction (one wins by score)
#   U = Undeclared conflict zone (plausible conflict not yet in meta/contradictions)
#   M = Multi-conflict (touches several at once)

questions:
  - id: Q01
    category: T
    question: "¿Cómo remuevo una reseña negativa que claramente viola las políticas de Airbnb?"
    probes_contradiction: "review-removal-pre2025-vs-broken2025 + call-playbook-vs-broken"
    expected_atoms:
      - reviews--three-removal-reasons
      - reviews--removal-process-broken-2025
      - reviews--removal-call-playbook
      - reviews--damage-claim-for-removal-odds
      - reviews--more-dilutes-negative
    expected_resolution: "temporal_supersession (broken-2025 default) + call-playbook como fallback low-success"
    expected_temporal_narrative: true

  - id: Q02
    category: D
    question: "¿Cuánto debería ajustar mi base price cada semana, 5% o 10%?"
    probes_contradiction: "base-price-5pct-vs-10pct"
    expected_atoms:
      - pricing--five-percent-adjustments
    expected_resolution: "specificity_tier: 5% gana (rechazo explícito del 10%); 10% como caveat en edge cases"
    expected_temporal_narrative: false

  - id: Q03
    category: C
    question: "En mi listado, ¿debería poner descuento o premium para jueves y domingos?"
    probes_contradiction: "thu-sun-discount-vs-premium"
    expected_atoms:
      - pricing--thu-sun-weekend-extension
      - pricing--weekend-days-definition
    expected_resolution: "contextual_scope: depende del booking pattern del market (mirar últimos 30 bookings)"
    expected_temporal_narrative: false

  - id: Q04
    category: C
    question: "Un huésped post-estancia me amenaza con dejarme una reseña mala si no le devuelvo dinero. ¿Qué hago?"
    probes_contradiction: "refund-threat-vs-refund-for-review-trade (espejos invertidos)"
    expected_atoms:
      - reviews--refund-threat-manipulation
    expected_resolution: "contextual_scope: rechazar + screenshot + reportar (guest inicia extortion)"
    expected_temporal_narrative: false

  - id: Q05
    category: C
    question: "Tuve un huésped con una mala estancia. ¿Hay forma legítima de inducir que él mismo proponga eliminar la reseña a cambio de un refund?"
    probes_contradiction: "refund-for-review-trade-loophole + removal-broken (scope)"
    expected_atoms:
      - reviews--refund-for-review-trade-2026-loophole
      - reviews--removal-process-broken-2025
    expected_resolution: "contextual_scope: loophole válido si guest propone literalmente; default broken aplica fuera del loophole"
    expected_temporal_narrative: false

  - id: Q06
    category: T
    question: "Estamos en 2026. ¿Cómo funciona hoy el sistema de remoción de reseñas en Airbnb?"
    probes_contradiction: "review-removal-pre2025-vs-broken2025"
    expected_atoms:
      - reviews--removal-process-broken-2025
      - reviews--three-removal-reasons
    expected_resolution: "temporal_supersession: broken-2025 es la realidad operativa; los 3 reasons formales subsisten"
    expected_temporal_narrative: true

  - id: Q07
    category: C
    question: "¿Cómo fijo el precio para una propiedad de 8 huéspedes: flat-price todo-incluido o base bajo más extra-guest-fee?"
    probes_contradiction: "price-for-max-occupancy-vs-extra-guest-fee-leverage"
    expected_atoms:
      - ranking--price-for-max-occupancy
      - pricing--extra-guest-fee-leverage
    expected_resolution: "contextual_scope: max-occupancy si listing nuevo o luchando; extra-fee si listing ya convierte"
    expected_temporal_narrative: false

  - id: Q08
    category: M
    question: "Acabo de publicar mi anuncio. Plan completo para los primeros 60 días: precio, mínimo de noches, reseñas, ranking."
    probes_contradiction: "price-for-max-occupancy-vs-extra-guest-fee-leverage + base-price-5pct-vs-10pct + new-listing zone"
    expected_atoms:
      - ranking--price-for-max-occupancy
      - pricing--five-percent-adjustments
    expected_resolution: "multi-conflict: max-occupancy default para new listing; extra-fee tras 3-5 reviews; 5% adjustments default"
    expected_temporal_narrative: false

  - id: Q09
    category: U
    question: "¿Activo Instant Book si quiero ser Superhost?"
    probes_contradiction: "potencial conflicto undeclared (Instant Book vs control de huéspedes)"
    expected_atoms: []
    expected_resolution: "si no hay conflict → respuesta limpia sin caveat falso; si hay → proponer entrada en proposed_contradictions"
    expected_temporal_narrative: false

  - id: Q10
    category: U
    question: "¿Cuál es el mínimo de noches recomendado para temporada alta en un mercado turístico?"
    probes_contradiction: "potencial conflicto undeclared (minimum-stay 1 vs 2-3 nights)"
    expected_atoms: []
    expected_resolution: "si hay conflict → caveat + proposed_contradictions; si no → respuesta directa"
    expected_temporal_narrative: false

  - id: Q11
    category: M
    question: "Mi rating bajó a 4.6 estrellas. Plan completo de recuperación: reseñas, dilución, remoción si procede."
    probes_contradiction: "review-removal multiple + dilution strategy"
    expected_atoms:
      - reviews--more-dilutes-negative
      - reviews--removal-process-broken-2025
      - reviews--removal-call-playbook
      - reviews--damage-claim-for-removal-odds
    expected_resolution: "multi: priorizar dilución (high-confidence path) sobre removal (broken default + low-odds fallback)"
    expected_temporal_narrative: true

  - id: Q12
    category: U
    question: "¿Vale la pena invertir en construir direct booking o me quedo solo en Airbnb?"
    probes_contradiction: "potencial undeclared (canal único vs multicanal)"
    expected_atoms: []
    expected_resolution: "si no hay atoms en conflicto → respuesta directa; si surgen tensiones → proposed_contradictions"
    expected_temporal_narrative: false

  - id: Q13
    category: U
    question: "Tengo presupuesto limitado. ¿Qué amenities tienen mayor impacto en rating y bookings?"
    probes_contradiction: "potencial undeclared (amenity ROI prioritization)"
    expected_atoms: []
    expected_resolution: "respuesta priorizada; si surge conflicto → caveat + proposed_contradictions"
    expected_temporal_narrative: false

  - id: Q14
    category: M
    question: "Quiero el plan de pricing completo: base price, weekend pricing, extras, ajustes semanales."
    probes_contradiction: "5%-vs-10% + thu-sun + max-occupancy-vs-extra-fee (3 conflictos pricing simultáneos)"
    expected_atoms:
      - pricing--five-percent-adjustments
      - pricing--thu-sun-weekend-extension
      - pricing--weekend-days-definition
      - pricing--extra-guest-fee-leverage
      - ranking--price-for-max-occupancy
    expected_resolution: "multi: estructurar respuesta por capa (base → weekend → extras → ajustes), un caveat por conflicto activo"
    expected_temporal_narrative: false

  - id: Q15
    category: U
    question: "Mi listing perdió posiciones en search. ¿Qué reviso primero?"
    probes_contradiction: "potencial undeclared (ranking diagnosis priorities)"
    expected_atoms: []
    expected_resolution: "si no hay conflict → checklist directo; si surge → caveat correspondiente"
    expected_temporal_narrative: false
