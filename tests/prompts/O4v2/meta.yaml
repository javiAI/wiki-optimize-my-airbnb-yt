# O4v2: Smart Contradiction Resolver + Auto-curation + Temporal Narrator
# Custom-tested optimization. Replaces O4-simple (overwrite, not separate label).
# Test battery: 15 questions probing real vault conflicts (see questions.yaml).
# Rubric: 6-dim custom (see _custom_evaluator_template.md).

label: O4v2
description: "Smart Contradiction Resolver: hierarchy-based resolution + auto-curation of new conflicts + temporal narrative on supersession"
optimization_type: kernel_logic
class: structural
overrides: O4
custom_rubric: true
custom_battery: true

# Test cycle:
#   1. Pre-test: 15 agents on CURRENT O4-simple state (label=O4v2-pre)
#   2. Implement O4v2 (kernel changes + RESPONSE_TEMPLATES.md update + apply-proposed-contradictions.py)
#   3. Post-test: 15 agents on O4v2 state (label=O4v2-post)
#   4. Compare O4v2-post vs O4v2-pre using custom 6-dim rubric

target_dims: [conflict_detection, resolution_clarity, temporal_narrative, context_awareness, proposed_contradiction_quality]
at_risk_dims: [tone_format]
neutral_dims: []

predicted_deltas:
  cost: +5.0           # +50-300 tokens per query for resolution rationale + temporal narrative + proposed_contradictions emission
  conflict_detection: +1.5      # baseline O4-simple flags but does not resolve
  resolution_clarity: +2.5      # NEW capability: hierarchy applied with rationale
  temporal_narrative: +2.0      # NEW capability: "antes/desde/hoy" pattern
  context_awareness: +1.0       # NEW: scope-distinct vs direct-contradiction distinction
  proposed_contradiction_quality: +2.0   # NEW capability: emit proposed_contradictions[]
  tone_format: -0.2             # caveat block + temporal narration may feel verbose

predictions_justification: |
  O4v2 redefine la opt: ya no es solo "flag conflict", es "detect + resolve + narrate +
  curate". Las 5 dims target son nuevas capacidades que O4-simple no tiene; el delta
  baseline es bajo (O4-simple emite caveat plano sin jerarquía ni narrativa temporal).

  Cost +5%: justifiable por el upgrade en utilidad. La respuesta gana resolución
  explícita ("primary porque temporal") + narrativa temporal cuando aplica + emit
  de proposed_contradictions[] que alimenta meta/contradictions.md vía script
  post-procesamiento.

  El test es "difícil de cerrar" en este ciclo: validamos QUÉ contradicciones se
  añaden + CÓMO + formato + criterio aplicado. NO validamos cómo se RE-USAN las
  contradicciones añadidas en queries futuras (eso requiere ciclos posteriores
  con la base de contradicciones expandida). Aceptado por el usuario.

  tone_format en at-risk: el caveat + narrativa temporal pueden alargar la
  respuesta. Mitigación: template compacto en RESPONSE_TEMPLATES.md (max 3 frases
  para temporal narrative).

allow_repetition: true

decision_logic:
  # Custom decision: 6-dim weighted_avg compared between O4v2-post and O4v2-pre.
  # No standard composite formula (custom rubric, custom dims).
  # Delivery thresholds:
  #   IMPLEMENT: weighted_avg delta ≥ +0.50 abs AND no dim drops > 1.0 abs
  #   ITERATE:   weighted_avg delta in [+0.20, +0.50] OR ambiguous tone_format drop
  #   REVERT:    weighted_avg delta < +0.20 OR conflict_detection regression OR resolution_clarity regression
  composite_formula: "weighted_avg_post - weighted_avg_pre"
  implement_threshold: 0.50
  iterate_threshold: 0.20
  hard_floors:
    - "conflict_detection abs drop ≥ 0.5"
    - "resolution_clarity abs drop ≥ 0.5"
