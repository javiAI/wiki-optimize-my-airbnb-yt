label: O8
description: "Auto-Linking System — auto-link.py post-ingest hook para insertar backlinks en MOCs"
optimization_type: automation_script
baseline_label: O7

target_dims: [completeness]
at_risk_dims: []
neutral_dims: [accuracy, spanish_purity, tone, format_compliance]

predicted_deltas:
  cost: 0
  completeness: 0.1
  accuracy: 0
  spanish_purity: 0
  tone: 0
  format_compliance: 0
  weighted_avg: 0.025

