notes: >
  auto-link.py inserta entradas en MOCs para átomos huérfanos. La auditoría inicial del vault
  (vault-agent.py) mostró 0 huérfanos: todos los átomos ya están en sus MOCs. Por tanto, el
  impacto esperado en tests es neutral (≈0), salvo varianza natural. Declared target_dim
  completeness con delta tiny (+0.1) para detectar si algún backfill marginal ayuda.
  allow_repetition: true para promediar si cae en noise zone.
